<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <title>List Sederhana</title>
</head>
<body class="p-5">
    <h1 class="text-xl font-bold">Unordered List (UL)</h1>
    <ul class="list-disc list-inside">
        <li>Mangga</li>
        <li>Pisang</li>
        <li>Jambu</li>
    </ul>
    <hr class="my-4">
    <h1 class="text-xl font-bold">Ordered List (OL)</h1>
    <ol class="list-decimal list-inside">
        <li>Buka Github.com</li>
        <li>Klik tombol plus dikanan atas</li>
        <li>Pilih New Repository</li>
        <li>Isi nama Repository</li>
        <li>Hidupkan Add Readme</li>
        <li>Klik create Repository</li>
    </ol>
</body>
</html>
