<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <title>Form Sederhana</title>
</head>
<body class="p-5">
    <form method="post" class="space-y-3">
        <label>Nama :</label>
        <input type="text" class="border p-1">
        <br>
        <input type="checkbox"> Setuju
        <input type="radio" name="pilih"> Pilihan
        <br>
        <label>Password :</label>
        <input type="password" class="border p-1">
        <br>
        <textarea class="border p-1" rows="5" cols="30">Ketik Text Area Message di sini</textarea>
        <br>
        <label>Apa warna favorit Kak Rani?</label>
        <br>
        <select class="border p-1">
            <option value="">Merah</option>
            <option value="">Kuning</option>
            <option value="">Hijau</option>
        </select>
        <br>
        <button class="bg-gray-200 border px-4 py-1">Simpan</button>
    </form>
</body>
</html>
